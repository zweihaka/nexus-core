services:
    web:
        image: nginx:latest
        ports:
            - "127.0.0.1:8080:80"
        volumes:
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
            - ./nginx/html:/usr/share/nginx/html:ro
        depends_on:
            - app
        environment:
            - NGINX_ENTRYPOINT_QUIET_LOGS=1
        restart: unless-stopped

    app:
        image: alpine:latest
        command: sh -c "while true; do echo 'HTTP/1.1 200 OK\n\nHello from App' | nc -l -p 8000; done"
